<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1e3d1a">
    <title>Login | Muslim Youth Association</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="../assets/css/common.css">
</head>

<body>
    <div class="registration-container">
        <div class="form-header">
            <h2>Welcome Back</h2>
            <p>Please login to access your dashboard and programs.</p>
        </div>

        <form id="loginForm" action="#" method="POST">
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn-submit">Login</button>
        </form>
        <!-- <div class="admin-note">
            <p>Admin demo login: <strong>admin@mcaa.org</strong> / <strong>Admin@123</strong></p>
        </div> -->

        <div class="form-footer">
            <p>Don't have an account? <a href="../REGISTER/register.html">Register here</a></p>
            <p><a href="../INDEX/index.html">← Back to Home</a></p>
        </div>
    </div>
    <script src="../assets/js/common.js"></script>

    <script src="login.js"></script>
</body>

</html>
