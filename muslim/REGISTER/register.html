<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1e3d1a">
    <title>Register | Muslim Youth Association</title>
    <link rel="stylesheet" href="register.css">
    <link rel="stylesheet" href="../assets/css/common.css">
    <link rel="stylesheet" href="../INDEX/index.css">
</head>

<body>
    <div class="registration-container">
        <div class="form-header">
            <h2>Join the Association</h2>
            <p>Create an account to register for Hifz programs and ask questions.</p>
        </div>

        <form id="registerForm" action="#" method="POST">
            <div class="input-group">
                <label for="full_name">Full Name</label>
                <input type="text" id="full_name" name="full_name" placeholder="Enter your full name" required>
            </div>

            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="example@mail.com" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Create a strong password" required>
            </div>

            <div class="input-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Repeat your password"
                    required>
            </div>

            <button type="submit" class="btn-submit">Create Account</button>
        </form>

        <div class="form-footer">
            <p>Already have an account? <a href="../LOGIN/login.html">Login here</a></p>
            <p><a href="index.html">← Back to Home</a></p>
        </div>
    </div>
    <script src="../assets/js/common.js"></script>


    <script src="register.js"></script>
</body>

</html>
